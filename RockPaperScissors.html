<!DOCTYPE html>
<html>
  <head>
    <title>RockPaperScissors</title>

    <link rel="stylesheet" href="RockPaperScissors.css">

  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    
    <button onclick="playGame('rock');" class="move-button"><img class="move-Image" src="images/rock-emoji.png"></button>

    <button onclick="playGame('paper');" class="move-button"><img class="move-Image" src="images/paper-emoji.png"></button>

    <button onclick="playGame('scissors')" class="move-button"><img class="move-Image" src="images/scissors-emoji.png"></button>

    <p class="js-moves" style="height: 1em;"></p> 
    <p class="js-result result"></p>
    <p class="js-score score"></p>
    
   
    <button class="reset-score-button" onclick=" //reset button
    score.wins = 0; 
    score.losses = 0; 
    score.ties = 0; 
    localStorage.removeItem('Score'); 
    updateResultElement('Make a move');
    updateScoreElement();
    ">ResetScore</button>
  
    <script src="RockPaperScissors.js"></script>
  </body>
</html>
