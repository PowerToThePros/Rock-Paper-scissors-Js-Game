<!DOCTYPE html>
<html>
  <head>
    <title>RockPaperScissors</title>
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    
    <button onclick="playGame('Rock');">ROCK</button>

    <button onclick="playGame('Paper');">PAPER</button>

    <button onclick="playGame('Scissors')">SCISSORS</button>

    <p class="js-moves" style="height: 1em;"></p> 
    <p class="js-result"></p>
    <p class="js-score"></p>
    
   
    <button onclick=" //reset button
    score.wins = 0; 
    score.losses = 0; 
    score.ties = 0; 
    localStorage.removeItem('Score'); 
    updateResultElement('Make a move');
    updateScoreElement();
    ">ResetScore</button>
  
    <script>

      let score = { /*a object to keep track of the score*/
        wins: 0,
        losses: 0,
        ties: 0
      };

      score = JSON.parse(localStorage.getItem('Score')) || score; // the default value score is cleaner then the line below
      //score = !savedScore ? score : savedScore;

      updateResultElement('Make a move');
      updateScoreElement();
      
      function playGame(move)
      {
        const computerMove = pickComputerMove();
        let result = '';

        if(move === 'Rock')
        {
          if(computerMove === 'Rock')
          {
            result = 'Tie';
          }
          else if(computerMove === 'Paper')
          {
            result = 'Lose';
          }
          else
          {
            result = 'Win';
          }
        }       
        else if(move === 'Paper')
        {
          if(computerMove === 'Rock')
          {
            result = 'Win';
          }
          else if(computerMove === 'Paper')
          {
            result = 'Tie';
          }
          else
          {
            result = 'Lose';
          }
        }
        else if(move === 'Scissors')
        {
          if(computerMove === 'Rock')
          {
            result = 'Lose';
          }
          else if(computerMove === 'Paper')
          {
            result = 'Win';
          }
          else
          {
            result = 'Tie';
          }
        }
        else
        {
          alert('error');
          return;
        }
        
        if(result === 'Win')
        {
          score.wins++;
        }
        else if(result === 'Lose')
        {
          score.losses++;
        }
        else if(result === 'Tie')
        {
          score.ties++;
        }

        localStorage.setItem('Score', JSON.stringify(score)); /*local storage keeps data saved even when refreshing the page, but it only saves strings, so we convert it into a json string*/

        updateResultElement(result);
        updateScoreElement();
      }

      function pickComputerMove()
      {
        const randomNumber = Math.random();

        let computerMove = '';

        if(randomNumber >= 0 && randomNumber < 1/3)
        {
          computerMove = 'Rock';
        }
        else if(randomNumber >= 1/3 && randomNumber < 2/3)
        {
          computerMove = 'Paper';
        }
        else
        {
          computerMove = 'Scissors';
        }

        document.querySelector('.js-moves').innerHTML = `computer picked: ${computerMove}`;

        return computerMove;
      }

      function updateScoreElement()
      {
        // searches for the html element with the class js-score and updates the innerHTML
        document.querySelector('.js-score').innerHTML = `wins: ${score.wins}, losses: ${score.losses}, ties: ${score.ties}`;
      }

      function updateResultElement(result)
      {
          document.querySelector('.js-result').innerHTML = result;
      }

    </script>
  </body>
</html>
