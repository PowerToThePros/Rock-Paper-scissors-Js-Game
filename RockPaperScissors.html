<!DOCTYPE html>
<html>
  <head>
    <title>RockPaperScissors</title>
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    
    <button onclick="playGame('Rock');">ROCK</button>

    <button onclick="playGame('Paper');">PAPER</button>

    <button onclick="playGame('Scissors')">SCISSORS</button>

    <button onclick="score.wins = 0; score.losses = 0; score.ties = 0;">ResetScore</button>
    
    <script>

      let score = { /*a object to keep track of the score*/
        wins: 0,
        losses: 0,
        ties: 0
      };

      function playGame(move)
      {
        const computerMove = pickComputerMove();
        let result = '';

        if(move === 'Rock')
        {
          if(computerMove === 'Rock')
          {
            result = 'Tie';
          }
          else if(computerMove === 'Paper')
          {
            result = 'Lose';
          }
          else
          {
            result = 'Win';
          }
        }       
        else if(move === 'Paper')
        {
          if(computerMove === 'Rock')
          {
            result = 'Win';
          }
          else if(computerMove === 'Paper')
          {
            result = 'Tie';
          }
          else
          {
            result = 'Lose';
          }
        }
        else if(move === 'Scissors')
        {
          if(computerMove === 'Rock')
          {
            result = 'Lose';
          }
          else if(computerMove === 'Paper')
          {
            result = 'Win';
          }
          else
          {
            result = 'Tie';
          }
        }
        else
        {
          alert('error');
          return;
        }
        
        if(result === 'Win')
        {
          score.wins++;
        }
        else if(result === 'Lose')
        {
          score.losses++;
        }
        else if(result === 'Tie')
        {
          score.ties++;
        }

        alert(`your move: ${move}, computer move: ${computerMove}, result: ${result}\nwins: ${score.wins}, losses: ${score.losses}, ties: ${score.ties}`);

      }

      function pickComputerMove()
      {
        const randomNumber = Math.random();

        let computerMove = '';

        if(randomNumber >= 0 && randomNumber < 1/3)
        {
          computerMove = 'Rock';
        }
        else if(randomNumber >= 1/3 && randomNumber < 2/3)
        {
          computerMove = 'Paper';
        }
        else
        {
          computerMove = 'Scissors';
        }

        return computerMove;
      }

    </script>
  </body>
</html>
